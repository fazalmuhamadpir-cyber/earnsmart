<!DOCTYPE html>
<html>
<head>
  <title>EarnSmart Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: #0c0c1d;
      color: white;
      font-family: Arial;
      text-align: center;
    }
    .box {
      background: #1a1a2e;
      padding: 20px;
      border-radius: 10px;
      margin: 20px;
    }
    button {
      padding: 10px 20px;
      border: none;
      background: purple;
      color: white;
      border-radius: 5px;
    }
    input {
      padding: 10px;
      margin: 10px;
      width: 80%;
    }
  </style>
</head>

<body>

<h2>EarnSmart Dashboard</h2>

<div class="box">
  <h3>Total Balance: <span id="balance">0</span> USDT</h3>
</div>

<div class="box">
  <h3>Deposit</h3>
  <input type="number" id="amount" placeholder="Enter amount"><br>
  <button onclick="deposit()">Deposit Now</button>
</div>

<script>
let balance = 0;

function deposit() {
  let amount = document.getElementById("amount").value;

  if(amount < 50){
    alert("Minimum 50 USDT");
    return;
  }

  // 🔥 AUTO APPROVE (for now)
  balance += Number(amount);
  document.getElementById("balance").innerText = balance;

  alert("Deposit Successful ✅");
}
</script>

</body>
</html>
