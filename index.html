<!DOCTYPE html>
<html>
<head>
  <title>EarnSmart Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: #0f1226;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }
    .box {
      background: #1c1f3a;
      padding: 20px;
      border-radius: 15px;
      margin: 20px;
    }
    input {
      padding: 10px;
      width: 220px;
      margin: 10px;
    }
    button {
      padding: 12px 22px;
      background: purple;
      color: white;
      border: none;
      border-radius: 10px;
    }
    #info {
      color: #90ee90;
      line-height: 1.6;
      word-break: break-all;
    }
  </style>
</head>

<body>

<h1>EarnSmart Dashboard</h1>

<div class="box">
  <h2>Total Balance: <span id="balance">0</span> USDT</h2>
</div>

<div class="box">
  <h3>Real Auto Deposit</h3>
  <input type="number" id="amount" placeholder="Enter amount">
  <br>
  <button onclick="checkDeposit()">Deposit Now</button>
  <p id="info"></p>
</div>

<script>
let balance = 0;
let pendingDeposit = null;

async function deposit() {
  let amount = document.getElementById("amount").value;

  if (amount < 50) {
    alert("Minimum 50 USDT");
    return;
  }

  const res = await fetch("/api/create-deposit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ amount })
  });

  const data = await res.json();

  if (!data.success) {
    alert(data.message || "Deposit create failed");
    return;
  }

  pendingDeposit = data;

  document.getElementById("info").innerHTML =
    "Send exactly <b>" + data.exactAmount + " USDT BEP20</b><br>" +
    "Wallet:<br><b>" + data.wallet + "</b><br><br>" +
    "Payment bhejne ke baad dobara Deposit Now dabao.";

  alert("Exact amount generated. Ab payment bhejo.");
}

async function checkDeposit() {
  if (!pendingDeposit) {
    return deposit();
  }

  const res = await fetch("/api/check-deposit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      exactAmount: pendingDeposit.exactAmount,
      createdAt: pendingDeposit.createdAt
    })
  });

  const data = await res.json();

  if (!data.success) {
    alert(data.message || "Payment not found yet");
    return;
  }

  balance += Number(pendingDeposit.exactAmount.split(".")[0]);
  document.getElementById("balance").innerText = balance;
  pendingDeposit = null;
  document.getElementById("info").innerHTML = "";

  alert("Real deposit verified ✅");
}
</script>

</body>
</html>
