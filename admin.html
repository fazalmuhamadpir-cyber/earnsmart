<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EarnSmart Admin Panel</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #312e81, #020617 70%);
      color: white;
      padding: 20px;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 22px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 16px 45px rgba(0,0,0,0.35);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 14px;
    }

    p, span {
      color: #cbd5e1;
      line-height: 1.5;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
      color: white;
      margin: 8px 0 12px;
      font-size: 15px;
    }

    button {
      border: none;
      border-radius: 13px;
      padding: 12px 15px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    .main {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      width: 100%;
    }

    .logout {
      background: #dc2626;
    }

    .approve {
      background: #16a34a;
    }

    .reject {
      background: #dc2626;
    }

    .refresh {
      background: #475569;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 14px;
    }

    .stat small { color: #94a3b8; display: block; margin-bottom: 6px; }
    .stat strong { font-size: 22px; }

    .request {
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 15px;
    }

    .request strong {
      display: block;
      font-size: 19px;
      margin-bottom: 8px;
    }

    .request span {
      display: block;
      font-size: 14px;
      word-break: break-word;
    }

    .btnrow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(234,179,8,0.14);
      border: 1px solid rgba(234,179,8,0.3);
      color: #fde68a;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .success {
      color: #22c55e;
      margin-top: 10px;
      font-weight: bold;
    }

    .error {
      color: #f87171;
      margin-top: 10px;
      font-weight: bold;
    }

    #panel {
      display: none;
    }

    .note {
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.25);
      color: #bbf7d0;
      padding: 12px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.5;
      margin-top: 12px;
    }

    .secure-badge{display:inline-block;background:rgba(34,197,94,.14);border:1px solid rgba(34,197,94,.28);color:#bbf7d0;padding:7px 10px;border-radius:999px;font-size:12px;font-weight:bold;margin-top:10px}
    .tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
    .tabs button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)}
    .tabs button.active{background:linear-gradient(135deg,#7c3aed,#2563eb)}
    .locked{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}

  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>EarnSmart Admin</h1>
      <p>Secure admin panel for approving deposit and withdraw requests.</p><span class="secure-badge">Firebase Admin Protected</span>
      <div class="note">
        Login only with the Firebase account that has <b>isAdmin: true</b> in Firestore users collection.
      </div>
    </div>

    <div id="loginBox" class="card">
      <h2>Admin Login</h2>
      <input type="email" id="email" placeholder="Admin email" />
      <input type="password" id="password" placeholder="Admin password" />
      <button class="main" onclick="adminLogin()">Login</button>
      <div id="loginMsg"></div>
    </div>

    <div id="panel">
      <div class="card">
        <div class="row">
          <div>
            <h2>Pending Requests</h2>
            <p>Approve only after checking TXID/payment manually.</p>
          </div>
          <div>
            <button class="refresh" onclick="loadRequests()">Refresh</button>
            <button class="logout" onclick="adminLogout()">Logout</button>
          </div>
        </div>

        <div class="tabs">
          <button id="tabAll" class="active" onclick="setAdminFilter('All')">All</button>
          <button id="tabDeposit" onclick="setAdminFilter('Deposit')">Deposits</button>
          <button id="tabWithdraw" onclick="setAdminFilter('Withdraw')">Withdraws</button>
        </div>
        <div id="adminStats" class="stats"></div>
        <div id="requests" class="grid"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    import {
      getFirestore,
      collection,
      getDocs,
      getDoc,
      doc,
      setDoc,
      updateDoc,
      query,
      where,
      increment
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAbv-UrjDuAR8Es5rTRnt6MBguyBCwhuQ4",
      authDomain: "earnsmart-addd8.firebaseapp.com",
      projectId: "earnsmart-addd8",
      storageBucket: "earnsmart-addd8.firebasestorage.app",
      messagingSenderId: "537098039483",
      appId: "1:537098039483:web:83e81bf69ad4e76226f99e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const $ = (id) => document.getElementById(id);
    let adminFilter = 'All';
    let pendingCache = [];

    window.setAdminFilter = function(type){
      adminFilter = type;
      ['All','Deposit','Withdraw'].forEach(x=>{
        const el = $('tab'+x);
        if(el) el.classList.toggle('active', x === type);
      });
      renderPendingRequests();
    };

    function renderPendingRequests(){
      const box = $('requests');
      let arr = pendingCache;
      if(adminFilter !== 'All') arr = pendingCache.filter(r => r.type === adminFilter);

      if (arr.length === 0) {
        box.innerHTML = '<div class="request"><strong>No pending '+adminFilter.toLowerCase()+' requests</strong><span>All requests are processed.</span></div>';
        return;
      }

      box.innerHTML = arr.map((r) => `
          <div class="request">
            <strong>${r.type || "-"} - ${r.amount || "0"} USDT</strong>
            <span class="badge">${r.status || "-"}</span>
            <span>User: ${r.name || "-"}</span>
            <span>Email: ${r.email || "-"}</span>
            <span>Method: ${r.method || "-"}</span>
            <span>Details: ${r.detail || "-"}</span>${r.txid ? `<span><a style="color:#38bdf8" target="_blank" href="https://bscscan.com/tx/${r.txid}">Verify TXID on BscScan</a></span>` : ""}
            <span>Date: ${r.date || "-"}</span>
            <div class="btnrow">
              <button class="approve" onclick="approveRequest('${r.id}')">Approve</button>
              <button class="reject" onclick="rejectRequest('${r.id}')">Reject</button>
            </div>
          </div>
        `).join("");
    }


    function getVipLevelFromDeposit(deposit){
      deposit = Number(deposit || 0);
      if(deposit >= 500) return 3;
      if(deposit >= 150) return 2;
      if(deposit >= 50) return 1;
      return 0;
    }

    async function checkAdmin(uid) {
      const snap = await getDoc(doc(db, "users", uid));
      return snap.exists() && snap.data().isAdmin === true;
    }

    async function findSponsorByReferralCode(referralCode) {
      if (!referralCode) return null;
      const q = query(collection(db, "users"), where("referralCode", "==", referralCode));
      const snap = await getDocs(q);
      if (snap.empty) return null;
      const d = snap.docs[0];
      return { uid: d.id, ...d.data() };
    }


    async function addReferralEarning(uid, amount, sourceName, sourceEmail, level, reason) {
      if (!uid || Number(amount) <= 0) return;
      const id = Date.now().toString() + Math.random().toString(36).slice(2, 7).toUpperCase();
      await setDoc(doc(db, "referralEarnings", id), {
        id,
        uid,
        amount: Number(amount).toFixed(2),
        sourceName: sourceName || "-",
        sourceEmail: sourceEmail || "-",
        level,
        reason,
        status: "Approved",
        date: new Date().toLocaleString()
      });
      await updateDoc(doc(db, "users", uid), { reward: increment(Number(amount)) });
    }

    async function payLevelCommissions(depositor, depositAmount) {
      const rates = [
        { level: 1, rate: 0.05 },
        { level: 2, rate: 0.03 },
        { level: 3, rate: 0.02 }
      ];

      let currentRef = depositor.refBy;

      for (const item of rates) {
        const sponsor = await findSponsorByReferralCode(currentRef);
        if (!sponsor) break;

        const sponsorVip = getVipLevelFromDeposit(Number(sponsor.deposit || 0));

        // VIP unlock rules:
        // VIP 1 unlocks level 1 commission
        // VIP 2 unlocks level 1 + level 2 commission
        // VIP 3 unlocks level 1 + level 2 + level 3 commission
        if (sponsorVip >= item.level) {
          const commission = Number(depositAmount) * item.rate;
          await addReferralEarning(
            sponsor.uid,
            commission,
            depositor.name,
            depositor.email,
            item.level,
            "VIP " + sponsorVip + " Level " + item.level + " Commission " + (item.rate * 100) + "%"
          );
        }

        currentRef = sponsor.refBy;
      }
    }

    async function payVip1DirectBonusIfNeeded(userUid, userBefore, approvedDepositAmount) {
      const oldDeposit = Number(userBefore.deposit || 0);
      const newDeposit = oldDeposit + Number(approvedDepositAmount || 0);

      // VIP 1 condition: user reaches deposit >= 50 USDT for the first time
      if (oldDeposit >= 50 || newDeposit < 50) return;

      // Prevent duplicate direct bonus
      if (userBefore.vip1DirectBonusPaid === true) return;

      const sponsor = await findSponsorByReferralCode(userBefore.refBy);
      if (!sponsor) {
        await updateDoc(doc(db, "users", userUid), { vip1DirectBonusPaid: true });
        return;
      }

      const earningId = Date.now().toString() + Math.random().toString(36).slice(2, 7).toUpperCase();

      await setDoc(doc(db, "referralEarnings", earningId), {
        id: earningId,
        uid: sponsor.uid,
        amount: "5.00",
        sourceName: userBefore.name || "-",
        sourceEmail: userBefore.email || "-",
        level: 1,
        reason: "VIP 1 Direct Bonus",
        status: "Approved",
        date: new Date().toLocaleString()
      });

      await updateDoc(doc(db, "users", sponsor.uid), {
        reward: increment(5)
      });

      await updateDoc(doc(db, "users", userUid), {
        vip1DirectBonusPaid: true
      });
    }


    window.adminLogin = async function () {
      $("loginMsg").innerHTML = "";

      try {
        const email = $("email").value.trim();
        const password = $("password").value;

        const cred = await signInWithEmailAndPassword(auth, email, password);
        const isAdmin = await checkAdmin(cred.user.uid);

        if (!isAdmin) {
          await signOut(auth);
          $("loginMsg").innerHTML = '<div class="error">Access denied. This Firebase account is not admin.</div>';
          return;
        }

        $("loginBox").style.display = "none";
        $("panel").style.display = "block";
        loadRequests();

      } catch (error) {
        $("loginMsg").innerHTML = '<div class="error">Login failed. Check admin email/password.</div>';
      }
    };

    window.adminLogout = async function () {
      await signOut(auth);
      location.reload();
    };

    window.loadRequests = async function () {
      const box = $("requests");
      const statsBox = $("adminStats");
      box.innerHTML = "<p>Loading pending requests...</p>";

      try {
        const allSnap = await getDocs(collection(db, "requests"));
        const totalUsersSnap = await getDocs(collection(db, "users"));
        let all = [];
        allSnap.forEach((d) => all.push(d.data()));

        pendingCache = all.filter(r => r.status === "Pending");
        const approvedDeposits = all.filter(r => r.type === "Deposit" && r.status === "Approved")
          .reduce((sum, r) => sum + Number(r.amount || 0), 0);
        const approvedWithdraws = all.filter(r => r.type === "Withdraw" && r.status === "Approved")
          .reduce((sum, r) => sum + Number(r.amount || 0), 0);

        statsBox.innerHTML = `
          <div class="stat"><small>Pending Requests</small><strong>${pendingCache.length}</strong></div>
          <div class="stat"><small>Approved Deposits</small><strong>${approvedDeposits.toFixed(2)} USDT</strong></div>
          <div class="stat"><small>Approved Withdraws</small><strong>${approvedWithdraws.toFixed(2)} USDT</strong></div>
          <div class="stat"><small>Total Requests</small><strong>${all.length}</strong></div><div class="stat"><small>Total Users</small><strong>${totalUsersSnap.size}</strong></div>
        `;

        pendingCache.sort((a, b) => String(b.id).localeCompare(String(a.id)));
        renderPendingRequests();

      } catch (error) {
        box.innerHTML = '<div class="request"><strong>Error loading requests</strong><span>' + error.message + '</span></div>';
      }
    };

    window.approveRequest = async function (id) {
      const ref = doc(db, "requests", id);
      const snap = await getDoc(ref);

      if (!snap.exists()) {
        alert("Request not found");
        return;
      }

      const r = snap.data();
      if (r.status !== "Pending") { alert("This request is already processed."); return; }
      const amount = Number(r.amount || 0);

      if (r.type === "Deposit") {
        const userRef = doc(db, "users", r.uid);
        const userSnap = await getDoc(userRef);

        if (!userSnap.exists()) {
          alert("User not found");
          return;
        }

        const userBefore = userSnap.data();

        await updateDoc(ref, { status: "Approved" });
        await updateDoc(userRef, {
          deposit: increment(amount)
        });

        await payVip1DirectBonusIfNeeded(r.uid, userBefore, amount);
        await payLevelCommissions({ uid: r.uid, ...userBefore }, amount);

        alert("Deposit approved. Balance added. VIP 1 direct bonus checked.");
        loadRequests();
        return;
      }

      if (r.type === "Withdraw") {
        const userRef = doc(db, "users", r.uid);
        const userSnap = await getDoc(userRef);

        if (!userSnap.exists()) {
          alert("User not found");
          return;
        }

        const user = userSnap.data();
        const deposit = Number(user.deposit || 0);
        const reward = Number(user.reward || 0);
        const available = deposit + reward;

        if (amount > available) {
          alert("Insufficient user balance. Available: " + available.toFixed(2) + " USDT");
          return;
        }

        let newDeposit = deposit;
        let newReward = reward;

        // Deduct reward first, then deposit
        if (newReward >= amount) {
          newReward = newReward - amount;
        } else {
          const remaining = amount - newReward;
          newReward = 0;
          newDeposit = newDeposit - remaining;
        }

        await updateDoc(userRef, {
          deposit: Number(newDeposit.toFixed(2)),
          reward: Number(newReward.toFixed(2))
        });

        await updateDoc(ref, { status: "Approved" });

        alert("Withdraw approved and user balance deducted.");
        loadRequests();
        return;
      }

      alert("Unknown request type.");
    };

    window.rejectRequest = async function (id) {
      await updateDoc(doc(db, "requests", id), {
        status: "Rejected"
      });

      alert("Request rejected");
      loadRequests();
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const isAdmin = await checkAdmin(user.uid);

        if (isAdmin) {
          $("loginBox").style.display = "none";
          $("panel").style.display = "block";
          loadRequests();
        }
      }
    });
  </script>
</body>
</html>
