<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EarnSmart Admin Panel</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #312e81, #020617 70%);
      color: white;
      padding: 20px;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 22px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 16px 45px rgba(0,0,0,0.35);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 14px;
    }

    p, span {
      color: #cbd5e1;
      line-height: 1.5;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
      color: white;
      margin: 8px 0 12px;
      font-size: 15px;
    }

    button {
      border: none;
      border-radius: 13px;
      padding: 12px 15px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    .main {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      width: 100%;
    }

    .logout {
      background: #dc2626;
    }

    .approve {
      background: #16a34a;
    }

    .reject {
      background: #dc2626;
    }

    .refresh {
      background: #475569;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    .request {
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 15px;
    }

    .request strong {
      display: block;
      font-size: 19px;
      margin-bottom: 8px;
    }

    .request span {
      display: block;
      font-size: 14px;
      word-break: break-word;
    }

    .btnrow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(234,179,8,0.14);
      border: 1px solid rgba(234,179,8,0.3);
      color: #fde68a;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .success {
      color: #22c55e;
      margin-top: 10px;
      font-weight: bold;
    }

    .error {
      color: #f87171;
      margin-top: 10px;
      font-weight: bold;
    }

    #panel {
      display: none;
    }

    .note {
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.25);
      color: #bbf7d0;
      padding: 12px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.5;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>EarnSmart Admin</h1>
      <p>Secure admin panel for approving deposit and withdraw requests.</p>
      <div class="note">
        Login only with the Firebase account that has <b>isAdmin: true</b> in Firestore users collection.
      </div>
    </div>

    <div id="loginBox" class="card">
      <h2>Admin Login</h2>
      <input type="email" id="email" placeholder="Admin email" />
      <input type="password" id="password" placeholder="Admin password" />
      <button class="main" onclick="adminLogin()">Login</button>
      <div id="loginMsg"></div>
    </div>

    <div id="panel">
      <div class="card">
        <div class="row">
          <div>
            <h2>Pending Requests</h2>
            <p>Approve only after checking TXID/payment manually.</p>
          </div>
          <div>
            <button class="refresh" onclick="loadRequests()">Refresh</button>
            <button class="logout" onclick="adminLogout()">Logout</button>
          </div>
        </div>

        <div id="requests" class="grid"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    import {
      getFirestore,
      collection,
      getDocs,
      getDoc,
      doc,
      updateDoc,
      query,
      where,
      increment
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAbv-UrjDuAR8Es5rTRnt6MBguyBCwhuQ4",
      authDomain: "earnsmart-addd8.firebaseapp.com",
      projectId: "earnsmart-addd8",
      storageBucket: "earnsmart-addd8.firebasestorage.app",
      messagingSenderId: "537098039483",
      appId: "1:537098039483:web:83e81bf69ad4e76226f99e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const $ = (id) => document.getElementById(id);

    async function checkAdmin(uid) {
      const snap = await getDoc(doc(db, "users", uid));
      return snap.exists() && snap.data().isAdmin === true;
    }

    window.adminLogin = async function () {
      $("loginMsg").innerHTML = "";

      try {
        const email = $("email").value.trim();
        const password = $("password").value;

        const cred = await signInWithEmailAndPassword(auth, email, password);
        const isAdmin = await checkAdmin(cred.user.uid);

        if (!isAdmin) {
          await signOut(auth);
          $("loginMsg").innerHTML = '<div class="error">This account is not admin. Set isAdmin: true in Firestore.</div>';
          return;
        }

        $("loginBox").style.display = "none";
        $("panel").style.display = "block";
        loadRequests();

      } catch (error) {
        $("loginMsg").innerHTML = '<div class="error">Login failed. Check admin email/password.</div>';
      }
    };

    window.adminLogout = async function () {
      await signOut(auth);
      location.reload();
    };

    window.loadRequests = async function () {
      const box = $("requests");
      box.innerHTML = "<p>Loading pending requests...</p>";

      try {
        const q = query(collection(db, "requests"), where("status", "==", "Pending"));
        const snap = await getDocs(q);

        let arr = [];
        snap.forEach((d) => arr.push(d.data()));

        arr.sort((a, b) => String(b.id).localeCompare(String(a.id)));

        if (arr.length === 0) {
          box.innerHTML = '<div class="request"><strong>No pending requests</strong><span>All requests are processed.</span></div>';
          return;
        }

        box.innerHTML = arr.map((r) => `
          <div class="request">
            <strong>${r.type || "-"} - ${r.amount || "0"} USDT</strong>
            <span class="badge">${r.status || "-"}</span>
            <span>User: ${r.name || "-"}</span>
            <span>Email: ${r.email || "-"}</span>
            <span>Method: ${r.method || "-"}</span>
            <span>Details: ${r.detail || "-"}</span>
            <span>Date: ${r.date || "-"}</span>
            <div class="btnrow">
              <button class="approve" onclick="approveRequest('${r.id}')">Approve</button>
              <button class="reject" onclick="rejectRequest('${r.id}')">Reject</button>
            </div>
          </div>
        `).join("");

      } catch (error) {
        box.innerHTML = '<div class="request"><strong>Error loading requests</strong><span>' + error.message + '</span></div>';
      }
    };

    window.approveRequest = async function (id) {
      const ref = doc(db, "requests", id);
      const snap = await getDoc(ref);

      if (!snap.exists()) {
        alert("Request not found");
        return;
      }

      const r = snap.data();
      const amount = Number(r.amount || 0);

      await updateDoc(ref, { status: "Approved" });

      if (r.type === "Deposit") {
        await updateDoc(doc(db, "users", r.uid), {
          deposit: increment(amount)
        });
      }

      if (r.type === "Withdraw") {
        await updateDoc(doc(db, "users", r.uid), {
          deposit: increment(-amount)
        });
      }

      alert(r.type + " approved");
      loadRequests();
    };

    window.rejectRequest = async function (id) {
      await updateDoc(doc(db, "requests", id), {
        status: "Rejected"
      });

      alert("Request rejected");
      loadRequests();
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const isAdmin = await checkAdmin(user.uid);

        if (isAdmin) {
          $("loginBox").style.display = "none";
          $("panel").style.display = "block";
          loadRequests();
        }
      }
    });
  </script>
</body>
</html>
